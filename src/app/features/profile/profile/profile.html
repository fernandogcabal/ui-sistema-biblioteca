<div class="profile-container">
  <div class="profile-card">
    <div class="profile-header">
      <div class="avatar-circle">👤</div>
      <h2>Mi Perfil</h2>
      <p>Gestiona la información de tu cuenta en la Biblioteca FJ</p>
    </div>

    <form (ngSubmit)="onUpdateProfile()">
      <div class="form-group-profile">
        <label>Nombre de Usuario</label>
        <input type="text" [(ngModel)]="userProfile().username" name="username" required />
      </div>

      <div class="form-group-profile">
        <label>Correo Electrónico</label>
        <input type="email" [(ngModel)]="userProfile().email" name="email" required />
      </div>

      <div class="profile-footer">
        <button type="submit" class="btn-save-profile">Guardar Cambios</button>
      </div>
    </form>
  </div>
</div>
